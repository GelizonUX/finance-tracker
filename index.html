<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" />

  <title>Finance Tracker Pro</title>
  <style>
    :root {
      --bg-1:#060816; --bg-2:#0a1230; --bg-3:#170b39; --text:#f8fbff; --muted:#a2b1cb;

    .brand{overflow:hidden;border-radius:30px;padding:22px;margin-bottom:20px}.brand h1{margin:0 0 10px;font-size:28px;line-height:1;font-weight:800}.brand p{margin:0;color:var(--muted);font-size:14px;line-height:1.6;max-width:240px}.brand-badge{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--text);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

    .btn,.toggle-btn,.hamburger-btn,.mobile-close,.schedule-btn,.icon-btn,.month-btn,.chip-action,.client-drop-btn{border:1px solid var(--border);background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));color:var(--text);border-radius:18px;box-shadow:var(--shadow-md);cursor:pointer;backdrop-filter:blur(18px) saturate(160%)}
    .btn{padding:11px 14px;font-weight:700}.btn.primary{border-color:rgba(255,255,255,.20);background:radial-gradient(circle at top left, rgba(255,255,255,.22), transparent 30%), linear-gradient(135deg, rgba(114,230,255,.88), rgba(127,99,255,.88) 56%, rgba(255,95,210,.82));color:#fff}.btn.danger{background:linear-gradient(180deg, rgba(255,107,134,.20), rgba(255,107,134,.10));border-color:rgba(255,107,134,.24);color:#ffdce4}

    .btn:hover,.toggle-btn:hover,.hamburger-btn:hover,.mobile-close:hover,.card.clickable:hover,.category-card:hover,.schedule-btn:hover,.icon-btn:hover,.month-btn:hover,.chip-action:hover,.bank-tile:hover,.client-card:hover,.wellness-status-card:hover,.reminder-row:hover,.well-card:hover,.suggestion-card:hover,.client-drop-btn:hover{transform:translateY(-2px)}

    .row-actions{position:relative;z-index:2;display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}.pill-row{position:relative;z-index:2;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14)}.pill.green{color:var(--green);background:rgba(41,211,145,.10);border-color:rgba(41,211,145,.22)}.pill.red{color:var(--red);background:rgba(255,107,134,.10);border-color:rgba(255,107,134,.22)}.pill.yellow{color:var(--yellow);background:rgba(255,189,89,.10);border-color:rgba(255,189,89,.22)}.pill.blue{color:var(--blue);background:rgba(116,183,255,.10);border-color:rgba(116,183,255,.22)}

    .categories-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.category-card{border-radius:18px;padding:14px;cursor:pointer}
    .hamburger-btn{display:none;width:52px;height:52px;border-radius:18px;align-items:center;justify-content:center;padding:0;flex-shrink:0}.hamburger-lines{display:flex;flex-direction:column;gap:4px}.hamburger-lines span{display:block;width:18px;height:2px;border-radius:999px;background:var(--text)}

    .ring-wrap{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;min-height:220px}.ring-center{position:absolute;text-align:center}.ring-center strong{display:block;font-size:30px;line-height:1;font-weight:900}.ring-center span{display:block;margin-top:6px;font-size:12px;color:var(--muted)}.bar-chart{position:relative;z-index:2;display:grid;gap:10px;margin-top:10px}.bar-row{display:grid;grid-template-columns:90px 1fr auto;align-items:center;gap:10px}.bar-label{font-size:12px;font-weight:700;color:var(--muted)}.bar-track{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08)}.bar-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));box-shadow:0 10px 22px rgba(114,230,255,.18)}.bar-value{font-size:12px;font-weight:800}
    .suggestions-grid{grid-template-columns:1fr 1fr}.suggestion-card{border-radius:18px;padding:14px;overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10)}.suggestion-title{position:relative;z-index:2;font-size:14px;font-weight:850;line-height:1.3}.suggestion-copy{position:relative;z-index:2;font-size:12px;line-height:1.55;color:var(--muted);margin-top:6px}
    .distribution-list{display:grid;gap:10px}.distribution-row{border-radius:18px;padding:14px;overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10)}.distribution-head{position:relative;z-index:2;display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.distribution-title{font-size:14px;font-weight:850}.distribution-copy{font-size:12px;color:var(--muted)}.distribution-progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08)}.distribution-progress span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
    .progress-wrap{position:relative;z-index:2;margin-top:12px}.progress-bar{width:100%;height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08)}.progress-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent-2),var(--accent-3))}
    .reminder-list{position:relative;z-index:2;display:grid;gap:10px}.reminder-row{border-radius:18px;padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}.reminder-row.overdue{border:1px solid rgba(255,107,134,.26);background:linear-gradient(180deg, rgba(255,107,134,.12), rgba(255,107,134,.05))}.reminder-badge{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:14px;font-size:18px;font-weight:900;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08)}.reminder-badge.upcoming{color:var(--blue)} .reminder-badge.overdue{color:var(--red)}.reminder-title{font-weight:850;font-size:15px;line-height:1.25;word-break:break-word}.reminder-sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45;word-break:break-word}
    @media (max-width:1100px){.content-grid,.well-hero-top,.suggestions-grid{grid-template-columns:1fr}.categories-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.well-insights{grid-template-columns:1fr}}

    @media (max-width:760px){.form-grid,.mini-grid,.categories-grid,.edit-grid,.suggestions-grid,.well-insights{grid-template-columns:1fr}.row-actions{flex-direction:column;align-items:stretch}.row-actions input,.row-actions button,.row-actions .btn,.row-actions textarea,.row-actions select{width:100%;max-width:none !important}.ledger-row{grid-template-columns:1fr;gap:6px}.edit-actions{justify-content:stretch}.edit-actions .icon-btn{width:44px;height:44px}input[type="date"],input[type="month"]{width:100%;min-width:0}.bank-grid,.client-months-grid{grid-template-columns:1fr}.month-chip-actions{grid-template-columns:1fr 1fr 1fr}.bar-row{grid-template-columns:1fr;gap:6px}}
    @media (max-width:520px){.stats{grid-template-columns:1fr 1fr}.topbar h2{font-size:22px}.topbar p{font-size:12px}input,select,textarea{font-size:16px}.mobile-sidebar{width:min(88vw,320px)}.bank-amount{font-size:22px}.client-name{font-size:18px}.month-chip{min-height:100px}}

<body>
  <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>
  <aside class="mobile-sidebar" id="mobileSidebar">
    <div class="mobile-sidebar-header">
      <div class="brand glass" style="margin-bottom:0;width:calc(100% - 56px);">
        <div class="brand-badge">Private tracker</div><h1>Finance Tracker</h1><p>Your private finance software.</p>
      </div>
      <button class="mobile-close glass-soft" type="button" onclick="closeMobileMenu()">✕</button>
    </div>
    <div class="nav" id="mobileSidebarNav"></div>
    <div class="sidebar-actions"><div class="switch-wrap"><span class="switch-label">Theme</span><button class="theme-switch" id="themeSwitchMobile" type="button"></button></div><button class="btn danger" id="resetBtnMobile" type="button">Reset all data</button></div>
  </aside>
  <div class="app">
    <aside class="sidebar"><div class="brand glass"><div class="brand-badge">Private tracker</div><h1>Finance Tracker</h1><p>Your private finance software with cleaner bank cards, compact client dropdown tracking, and a more premium wellness dashboard.</p></div><div class="nav" id="desktopNav"></div><div class="sidebar-actions"><div class="switch-wrap"><span class="switch-label">Theme</span><button class="theme-switch" id="themeSwitchSide" type="button"></button></div><button class="btn danger" id="resetBtn" type="button">Reset all data</button></div></aside>
    <main class="main">
      <div class="topbar"><div class="topbar-left"><div class="mobile-top-controls"><button class="hamburger-btn glass-soft" id="hamburgerBtn" type="button"><span class="hamburger-lines"><span></span><span></span><span></span></span></button><div class="switch-wrap"><span class="switch-label">Theme</span><button class="theme-switch" id="themeSwitchTop" type="button"></button></div></div><div class="topbar-text"><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Your complete money overview.</p></div></div><div class="quick-actions"><button class="btn hidden" id="backBtn" type="button">Back to home</button><div class="switch-wrap"><span class="switch-label">Theme</span><button class="theme-switch" id="themeSwitchDesktopTop" type="button"></button></div></div></div>
      <div id="appView"></div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'financeTrackerStableV16';
    function makeId(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
    const DEFAULT_STATE = { theme:'dark', currentView:'dashboard', selectedCategoryId:null, expandedClientId:null, categories:[{id:makeId(),name:'Groceries'},{id:makeId(),name:'Transport'},{id:makeId(),name:'Business'}], bankAccounts:[], savings:[], clients:[], jobApplications:[], bills:[], subscriptions:[], transactions:[] };
    function clone(v){ return JSON.parse(JSON.stringify(v)); }
    function loadState(){ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return clone(DEFAULT_STATE); try{ const p=JSON.parse(raw); return { theme:p.theme||'dark', currentView:p.currentView||'dashboard', selectedCategoryId:p.selectedCategoryId||null, expandedClientId:p.expandedClientId||null, categories:Array.isArray(p.categories)&&p.categories.length?p.categories:clone(DEFAULT_STATE.categories), bankAccounts:Array.isArray(p.bankAccounts)?p.bankAccounts:[], savings:Array.isArray(p.savings)?p.savings:[], clients:Array.isArray(p.clients)?p.clients.map(c=>({...c,schedules:Array.isArray(c.schedules)?c.schedules:[]})):[], jobApplications:Array.isArray(p.jobApplications||p.applications)?(p.jobApplications||p.applications).map(a=>({...a,link:a.link||'',platform:a.platform||''})):[], bills:Array.isArray(p.bills)?p.bills:[], subscriptions:Array.isArray(p.subscriptions)?p.subscriptions:[], transactions:Array.isArray(p.transactions)?p.transactions:[] }; }catch(e){ return clone(DEFAULT_STATE); } }
    let state = loadState(); let toastTimer = null;
    const NAV_ITEMS = [{key:'dashboard',label:'Dashboard'},{key:'bankBalances',label:'Bank Balance'},{key:'savings',label:'Savings'},{key:'clients',label:'Clients'},{key:'jobApplications',label:'Job Applications'},{key:'bills',label:'Bills'},{key:'subscriptions',label:'Subscriptions'},{key:'categories',label:'Categories'},{key:'transactions',label:'Transactions'}];
    const el = id => document.getElementById(id);
    function showToast(message){ const t=el('toast'); t.textContent=message; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800); }
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function applyTheme(){ document.body.classList.toggle('light', state.theme==='light'); }
    function toggleTheme(){ state.theme = state.theme==='dark' ? 'light' : 'dark'; saveState(); renderApp(); }
    function escapeHtml(v){ return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;'); }
    function toNumberInput(v){ if(typeof v==='number') return v; const n=Number(String(v||'').replace(/,/g,'').replace(/[^\d.-]/g,'')); return Number.isNaN(n)?NaN:n; }
    function formatMoney(v){ if(v===''||v===null||v===undefined) return 'Not set'; const n=Number(v); if(Number.isNaN(n)) return String(v); return new Intl.NumberFormat('en-PH',{style:'currency',currency:'PHP',maximumFractionDigits:2}).format(n); }
    function formatCurrency(v,c){ if(v===''||v===null||v===undefined) return 'Not set'; const n=Number(v); if(Number.isNaN(n)) return String(v); const code=c==='USD'?'USD':'PHP'; return new Intl.NumberFormat(code==='USD'?'en-US':'en-PH',{style:'currency',currency:code,maximumFractionDigits:2}).format(n); }
    function formatDate(s){ if(!s) return 'No date'; const d=new Date(s+(s.length===10?'T12:00:00':'')); if(Number.isNaN(d.getTime())) return s; return d.toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}); }
    function getMonthLabelFromDate(s){ const d=new Date(s+'T12:00:00'); if(Number.isNaN(d.getTime())) return 'Unknown month'; return d.toLocaleDateString('en-PH',{year:'numeric',month:'short'}); }
    function getSavingsMonthLabel(m){ if(!m) return 'No month'; const [y,mm]=m.split('-'); const d=new Date(Number(y), Number(mm)-1, 1); if(Number.isNaN(d.getTime())) return m; return d.toLocaleDateString('en-PH',{year:'numeric',month:'long'}); }
    function getCategoryName(id){ if(!id) return 'Uncategorized'; const found=state.categories.find(cat=>cat.id===id); return found?found.name:'Uncategorized'; }
    function getApplicationStatusClass(status){ const v=String(status||'').toLowerCase(); if(v.includes('hire')) return 'green'; if(v.includes('reject')) return 'red'; if(v.includes('follow')||v.includes('phase')) return 'yellow'; return ''; }
    function getBankIcon(name){ const v=String(name||'').toLowerCase(); if(v.includes('gcash')) return '₲'; if(v.includes('maya')) return 'M'; if(v.includes('bpi')) return 'B'; if(v.includes('union')) return 'U'; if(v.includes('bdo')) return 'D'; if(v.includes('metro')) return '₱'; if(v.includes('landbank')) return 'L'; if(v.includes('security')) return 'S'; if(v.includes('chinabank')) return 'C'; if(v.includes('paypal')) return 'P'; if(v.includes('gotyme')) return 'G'; if(v.includes('tonik')) return 'T'; if(v.includes('seabank')) return '◈'; return String(name||'?').trim().charAt(0).toUpperCase() || '?'; }
    const iconPencil=()=> '✎', iconSave=()=> '✓', iconTrash=()=> '🗑';
    function todayDateString(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
    function diffInDays(dateString){ if(!dateString) return null; const target=new Date(dateString+'T12:00:00'); const today=new Date(todayDateString()+'T12:00:00'); if(Number.isNaN(target.getTime())) return null; return Math.round((target-today)/86400000); }

    function getReminders(){
      const items=[];
      state.bills.forEach(b=>{ if(b.paid||!b.dueDate) return; const days=diffInDays(b.dueDate); if(days!==null && days<=5) items.push({id:b.id,type:'bill',label:b.name,amount:b.amount,date:b.dueDate,status:days<0?'overdue':'upcoming',days}); });
      state.clients.forEach(client=>{ (client.schedules||[]).forEach(s=>{ if(s.status==='paid'||!s.dueDate) return; const days=diffInDays(s.dueDate); if(days!==null && days<=5) items.push({id:s.id,type:'client',label:`${client.name} payment`,amount:s.expectedAmount,date:s.dueDate,status:s.status==='delayed'||days<0?'overdue':'upcoming',days,currency:client.currency}); }); });
      state.subscriptions.forEach(sub=>{ const m=String(sub.renewal||'').match(/\d{4}-\d{2}-\d{2}/); if(sub.paid||!m) return; const due=m[0]; const days=diffInDays(due); if(days!==null && days<=5) items.push({id:sub.id,type:'subscription',label:sub.name,amount:sub.amount,date:due,status:days<0?'overdue':'upcoming',days}); });
      return items.sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);
    }
    function getSummary(){ const income=state.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0); const expense=state.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0); const txBal=income-expense; const bankTotal=state.bankAccounts.reduce((s,a)=>s+Number(a.amount||0),0); const mainBalance=bankTotal+txBal; const debtBills=state.bills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.amount),0); const debtSubs=state.subscriptions.filter(s=>!s.paid).reduce((sum,x)=>sum+Number(x.amount),0); const savingsTotal=state.savings.reduce((s,x)=>s+Number(x.currentAmount||0),0); const savedThisMonthTotal=state.savings.reduce((s,x)=>s+Number(x.savedThisMonth||0),0); return { bankTotal, transactionIncome:income, transactionExpenses:expense, transactionBalance:txBal, balance:mainBalance, debt:debtBills+debtSubs, extraMoney:mainBalance-(debtBills+debtSubs), savingsTotal, savedThisMonthTotal }; }
    function getWellnessData(){ const summary=getSummary(); const spendingRatio = summary.transactionIncome>0 ? summary.transactionExpenses/summary.transactionIncome : (summary.transactionExpenses>0?1:0); const spendingScore=Math.max(0,Math.min(100,Math.round((1-spendingRatio)*100))); const savingsCoverage=summary.balance>0 ? (summary.savingsTotal/summary.balance)*100 : 0; const savingsScore=Math.max(0,Math.min(100,Math.round(savingsCoverage))); const debtPressure=summary.balance>0 ? (summary.debt/summary.balance)*100 : (summary.debt>0?100:0); const stabilityScore=Math.max(0,Math.min(100,Math.round(100-debtPressure))); let overall='Healthy'; if(stabilityScore<35 || summary.extraMoney<0) overall='Critical'; else if(stabilityScore<60 || summary.debt>summary.balance*.5) overall='Watch'; const suggestions=[]; if(summary.transactionExpenses>summary.transactionIncome && summary.transactionIncome>0) suggestions.push({title:'Spending is outpacing income',copy:'Your posted expenses are higher than your posted income. Cut the heaviest flexible category first and give yourself a weekly cap.'}); if(summary.debt>0 && summary.balance>0) suggestions.push({title:'Debt is reducing your free cash',copy:`You still have ${formatMoney(summary.debt)} in unpaid bills or subscriptions. Clear the nearest due items first so your extra money improves faster.`}); if(summary.savingsTotal<summary.balance*.2 && summary.balance>0) suggestions.push({title:'Savings protection is still thin',copy:'Your protected savings is below 20% of your current balance. Move a fixed amount into savings right after income lands.'}); if(summary.savedThisMonthTotal<=0) suggestions.push({title:'No savings movement this month yet',copy:'Add even a small monthly savings amount to build momentum. Consistency matters more than waiting for a big extra amount.'}); if(!suggestions.length) suggestions.push({title:'Your money flow looks stable',copy:'You are in a good spot. Keep the current structure, review due dates weekly, and increase savings gradually without hurting cash flow.'}); const expenseBuckets=state.categories.map(cat=>({name:cat.name,amount:state.transactions.filter(t=>t.type==='expense'&&t.categoryId===cat.id).reduce((s,t)=>s+Number(t.amount),0)})).filter(x=>x.amount>0).sort((a,b)=>b.amount-a.amount).slice(0,4); return {summary,spendingScore,savingsScore,stabilityScore,overall,suggestions,expenseBuckets,avgIncome:summary.transactionIncome/Math.max(state.transactions.filter(t=>t.type==='income').length,1),avgExpense:summary.transactionExpenses/Math.max(state.transactions.filter(t=>t.type==='expense').length,1),savingsGap:Math.max(0,30-savingsScore)}; }

    function setView(view, categoryId=null){ state.currentView=view; state.selectedCategoryId=categoryId; saveState(); renderApp(); closeMobileMenu(); window.scrollTo({top:0,behavior:'smooth'}); }
    function goHome(){ setView('dashboard'); } function openMobileMenu(){ document.body.classList.add('mobile-open'); } function closeMobileMenu(){ document.body.classList.remove('mobile-open'); }
    function toggleEditPanel(id){ const p=el(id); if(p) p.classList.toggle('open'); } function toggleClientPanel(id){ state.expandedClientId = state.expandedClientId===id ? null : id; saveState(); renderApp(); }
    function createTransaction(data){ const tx={id:makeId(),title:data.title,amount:Number(data.amount),type:data.type,categoryId:data.categoryId||null,sourceType:data.sourceType||'manual',sourceId:data.sourceId||null,createdAt:new Date().toISOString()}; state.transactions.push(tx); saveState(); return tx.id; }
    function removeTransactionById(id){ state.transactions=state.transactions.filter(t=>t.id!==id); saveState(); }
    function categoryOptionsHtml(selected=''){ return `<option value="">Uncategorized</option>` + state.categories.map(c=>`<option value="${c.id}" ${selected===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join(''); }
    function applicationStatusOptionsHtml(selected=''){ return ['1st Phase','Follow Up','Rejected','Hired','Custom'].map(opt=>`<option value="${opt}" ${selected===opt?'selected':''}>${opt}</option>`).join(''); }

    function addBankAccount(e){ e.preventDefault(); const bankName=el('bankName').value.trim(); const amount=toNumberInput(el('bankAmount').value); if(!bankName) return alert('Please enter a bank name.'); if(Number.isNaN(amount)||amount<0) return alert('Please enter a valid bank amount.'); state.bankAccounts.push({id:makeId(),bankName,amount}); saveState(); renderApp(); showToast('Bank account added.'); }
    function saveBankAmount(id){ const bank=state.bankAccounts.find(i=>i.id===id); if(!bank) return alert('Bank account not found.'); const newName=el(`bankName_${id}`).value.trim(); const newAmount=toNumberInput(el(`bankAmount_${id}`).value); if(!newName) return alert('Please enter a bank name.'); if(Number.isNaN(newAmount)||newAmount<0) return alert('Please enter a valid bank amount.'); bank.bankName=newName; bank.amount=newAmount; saveState(); renderApp(); showToast('Bank balance saved.'); }
    function deleteBankAccount(id){ state.bankAccounts=state.bankAccounts.filter(i=>i.id!==id); saveState(); renderApp(); showToast('Bank account deleted.'); }

    function addSavings(e){ e.preventDefault(); const name=el('savingsName').value.trim(); const bankName=el('savingsBank').value.trim(); const currentAmount=toNumberInput(el('savingsCurrentAmount').value); const savedThisMonth=toNumberInput(el('savingsSavedThisMonth').value||0); const targetMonth=el('savingsTargetMonth').value; const targetAmount=toNumberInput(el('savingsTargetAmount').value||0); const notes=el('savingsNotes').value.trim(); if(!name) return alert('Please enter a savings name.'); if(!bankName) return alert('Please enter a bank name for this savings.'); if(Number.isNaN(currentAmount)||currentAmount<0) return alert('Please enter a valid current savings amount.'); if(Number.isNaN(savedThisMonth)||savedThisMonth<0) return alert('Please enter a valid saved this month amount.'); if(Number.isNaN(targetAmount)||targetAmount<0) return alert('Please enter a valid target amount.'); state.savings.push({id:makeId(),name,bankName,currentAmount,savedThisMonth,targetMonth,targetAmount,notes}); saveState(); renderApp(); showToast('Savings item added.'); }
    function saveSavings(id){ const item=state.savings.find(s=>s.id===id); if(!item) return alert('Savings item not found.'); const name=el(`saveName_${id}`).value.trim(); const bankName=el(`saveBank_${id}`).value.trim(); const currentAmount=toNumberInput(el(`saveCurrent_${id}`).value); const savedThisMonth=toNumberInput(el(`saveMonth_${id}`).value||0); const targetMonth=el(`saveTargetMonth_${id}`).value; const targetAmount=toNumberInput(el(`saveTargetAmount_${id}`).value||0); const notes=el(`saveNotes_${id}`).value.trim(); if(!name) return alert('Please enter a savings name.'); if(!bankName) return alert('Please enter a bank name.'); if(Number.isNaN(currentAmount)||currentAmount<0) return alert('Please enter a valid current amount.'); if(Number.isNaN(savedThisMonth)||savedThisMonth<0) return alert('Please enter a valid monthly saved amount.'); if(Number.isNaN(targetAmount)||targetAmount<0) return alert('Please enter a valid target amount.'); Object.assign(item,{name,bankName,currentAmount,savedThisMonth,targetMonth,targetAmount,notes}); saveState(); renderApp(); showToast('Savings item saved.'); }
    function deleteSavings(id){ state.savings=state.savings.filter(s=>s.id!==id); saveState(); renderApp(); showToast('Savings item deleted.'); }

    function addCategory(e){ e.preventDefault(); const name=el('newCategoryName').value.trim(); if(!name) return alert('Enter a category name first.'); if(state.categories.some(c=>c.name.toLowerCase()===name.toLowerCase())) return alert('That category already exists.'); state.categories.push({id:makeId(),name}); saveState(); renderApp(); showToast('Category added.'); }
    function deleteCategory(id){ if(state.transactions.some(t=>t.categoryId===id)||state.bills.some(b=>b.categoryId===id)||state.subscriptions.some(s=>s.categoryId===id)) return alert('This category is still being used. Remove or reassign linked items first.'); state.categories=state.categories.filter(c=>c.id!==id); saveState(); renderApp(); showToast('Category deleted.'); }

    function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
    function buildClientSchedules(nextPaymentDate, expectedAmount){ const anchor=new Date(nextPaymentDate+'T12:00:00'); if(Number.isNaN(anchor.getTime())) return []; const year=anchor.getFullYear(); const day=anchor.getDate(); const startMonth=anchor.getMonth(); const schedules=[]; for(let month=startMonth; month<=11; month++){ const safeDay=Math.min(day, daysInMonth(year,month)); const due=new Date(year,month,safeDay,12,0,0); const dueDate=due.toISOString().slice(0,10); schedules.push({id:makeId(),dueDate,yearMonth:dueDate.slice(0,7),expectedAmount:Number(expectedAmount),status:'pending',transactionId:null}); } return schedules; }
    function handleClientRateTypeChange(){ const select=el('clientRateType'); const hourlyField=el('clientHoursField'); if(!select||!hourlyField) return; if(select.value==='hourly') hourlyField.classList.remove('hidden'); else { hourlyField.classList.add('hidden'); const h=el('clientExpectedHours'); if(h) h.value=''; } }
    function addClient(e){ e.preventDefault(); const name=el('clientName').value.trim(); const rateType=el('clientRateType').value; const currency=el('clientCurrency').value; const rateAmount=toNumberInput(el('clientRateAmount').value); const nextPaymentDate=el('clientNextPaymentDate').value; const expectedHours=toNumberInput((el('clientExpectedHours')||{}).value); if(!name) return alert('Please enter a client name.'); if(Number.isNaN(rateAmount)||rateAmount<=0) return alert('Please enter a valid rate amount.'); if(!nextPaymentDate) return alert('Please enter the next expected payment date.'); const date=new Date(nextPaymentDate+'T12:00:00'); if(Number.isNaN(date.getTime())) return alert('Please enter a valid payment date.'); let expectedMonthlyAmount=rateAmount, storedHours=null; if(rateType==='hourly'){ if(Number.isNaN(expectedHours)||expectedHours<=0) return alert('Please enter expected monthly hours for hourly clients.'); storedHours=expectedHours; expectedMonthlyAmount=rateAmount*expectedHours; } const schedules=buildClientSchedules(nextPaymentDate, expectedMonthlyAmount); if(!schedules.length) return alert('Could not generate payment schedules.'); const id=makeId(); state.clients.push({id,name,rateType,currency,rateAmount,expectedHours:storedHours,expectedMonthlyAmount,nextPaymentDate,paymentDay:date.getDate(),schedules}); state.expandedClientId=id; saveState(); renderApp(); showToast('Client with payment schedule added.'); }
    function getClientById(id){ return state.clients.find(c=>c.id===id); }
    function getClientScheduleById(client,id){ return client && Array.isArray(client.schedules) ? client.schedules.find(s=>s.id===id) : null; }
    function setClientScheduleStatus(clientId,scheduleId,nextStatus){ const client=getClientById(clientId); const schedule=getClientScheduleById(client,scheduleId); if(!client||!schedule) return alert('Could not find this client payment row.'); if(schedule.transactionId){ removeTransactionById(schedule.transactionId); schedule.transactionId=null; } if(nextStatus==='paid'){ schedule.transactionId=createTransaction({title:`${client.name} payment - ${getMonthLabelFromDate(schedule.dueDate)}`,amount:schedule.expectedAmount,type:'income',sourceType:'clientSchedule',sourceId:schedule.id}); } schedule.status=nextStatus; saveState(); renderApp(); showToast('Client payment status updated.'); }
    function getClientScheduleCounts(client){ const counts={pending:0,paid:0,delayed:0}; (client.schedules||[]).forEach(s=>{ if(s.status==='paid') counts.paid++; else if(s.status==='delayed') counts.delayed++; else counts.pending++; }); return counts; }
    function deleteClient(id){ const client=getClientById(id); if(!client) return; (client.schedules||[]).forEach(s=>{ if(s.transactionId) removeTransactionById(s.transactionId); }); state.clients=state.clients.filter(c=>c.id!==id); if(state.expandedClientId===id) state.expandedClientId=null; saveState(); renderApp(); showToast('Client deleted.'); }

    function addJobApplication(e){ e.preventDefault(); const clientName=el('jobApplicationClientName').value.trim(); const position=el('jobApplicationPosition').value.trim(); const salary=el('jobApplicationSalary').value.trim(); const dateApplied=el('jobApplicationDateApplied').value; const statusSelect=el('jobApplicationStatusSelect').value; const customStatus=el('jobApplicationCustomStatus').value.trim(); const link=el('jobApplicationLink').value.trim(); const platform=el('jobApplicationPlatform').value.trim(); const status=statusSelect==='Custom' ? customStatus : statusSelect; if(!clientName||!position) return alert('Please enter a client name and position.'); if(!status) return alert('Please choose or enter a status.'); state.jobApplications.push({id:makeId(),clientName,position,salary,dateApplied,status,link,platform}); saveState(); renderApp(); showToast('Job application added.'); }
    function handleJobApplicationStatusSelectChange(){ const select=el('jobApplicationStatusSelect'); const custom=el('jobApplicationCustomStatus'); if(!select||!custom) return; if(select.value==='Custom') custom.classList.remove('hidden'); else { custom.classList.add('hidden'); custom.value=''; } }
    function saveJobApplication(id){ const app=state.jobApplications.find(i=>i.id===id); if(!app) return alert('Job application not found.'); const clientName=el(`jobClient_${id}`).value.trim(); const position=el(`jobPosition_${id}`).value.trim(); const salary=el(`jobSalary_${id}`).value.trim(); const dateApplied=el(`jobDate_${id}`).value; const status=el(`jobStatus_${id}`).value.trim(); const link=el(`jobLink_${id}`).value.trim(); const platform=el(`jobPlatform_${id}`).value.trim(); if(!clientName||!position) return alert('Please enter a client name and position.'); if(!status) return alert('Please enter a valid status.'); Object.assign(app,{clientName,position,salary,dateApplied,status,link,platform}); saveState(); renderApp(); showToast('Job application saved.'); }
    function deleteJobApplication(id){ state.jobApplications=state.jobApplications.filter(i=>i.id!==id); saveState(); renderApp(); showToast('Job application deleted.'); }

    function addBill(e){ e.preventDefault(); const name=el('billName').value.trim(); const amount=toNumberInput(el('billAmount').value); const dueDate=el('billDueDate').value; const categoryId=el('billCategory').value||null; if(!name||Number.isNaN(amount)||amount<=0) return alert('Please enter a bill name and valid amount.'); state.bills.push({id:makeId(),name,amount,dueDate,categoryId,paid:false,transactionId:null}); saveState(); renderApp(); showToast('Bill added.'); }
    function toggleBillPaid(id){ const bill=state.bills.find(b=>b.id===id); if(!bill) return; if(!bill.paid){ bill.transactionId=createTransaction({title:`${bill.name} bill paid`,amount:bill.amount,type:'expense',categoryId:bill.categoryId,sourceType:'bill',sourceId:bill.id}); bill.paid=true; } else { if(bill.transactionId) removeTransactionById(bill.transactionId); bill.paid=false; bill.transactionId=null; } saveState(); renderApp(); showToast('Bill payment updated.'); }
    function deleteBill(id){ const bill=state.bills.find(b=>b.id===id); if(!bill) return; if(bill.transactionId) removeTransactionById(bill.transactionId); state.bills=state.bills.filter(b=>b.id!==id); saveState(); renderApp(); showToast('Bill deleted.'); }
    function addSubscription(e){ e.preventDefault(); const name=el('subscriptionName').value.trim(); const amount=toNumberInput(el('subscriptionAmount').value); const renewal=el('subscriptionRenewal').value.trim(); const categoryId=el('subscriptionCategory').value||null; if(!name||Number.isNaN(amount)||amount<=0) return alert('Please enter a subscription name and valid amount.'); state.subscriptions.push({id:makeId(),name,amount,renewal,categoryId,paid:false,transactionId:null}); saveState(); renderApp(); showToast('Subscription added.'); }
    function toggleSubscriptionPaid(id){ const sub=state.subscriptions.find(s=>s.id===id); if(!sub) return; if(!sub.paid){ sub.transactionId=createTransaction({title:`${sub.name} subscription paid`,amount:sub.amount,type:'expense',categoryId:sub.categoryId,sourceType:'subscription',sourceId:sub.id}); sub.paid=true; } else { if(sub.transactionId) removeTransactionById(sub.transactionId); sub.paid=false; sub.transactionId=null; } saveState(); renderApp(); showToast('Subscription payment updated.'); }
    function deleteSubscription(id){ const sub=state.subscriptions.find(s=>s.id===id); if(!sub) return; if(sub.transactionId) removeTransactionById(sub.transactionId); state.subscriptions=state.subscriptions.filter(s=>s.id!==id); saveState(); renderApp(); showToast('Subscription deleted.'); }
    function addManualTransaction(e){ e.preventDefault(); const title=el('manualTitle').value.trim(); const amount=toNumberInput(el('manualAmount').value); const type=el('manualType').value; const categoryId=el('manualCategory').value||null; if(!title||Number.isNaN(amount)||amount<=0) return alert('Please enter a valid title and amount.'); createTransaction({title,amount,type,categoryId,sourceType:'manual'}); renderApp(); showToast('Transaction added.'); }
    function deleteTransaction(id){ const txn=state.transactions.find(t=>t.id===id); if(!txn) return; if(txn.sourceType!=='manual') return alert('This transaction is linked to another section. Manage it from there.'); state.transactions=state.transactions.filter(t=>t.id!==id); saveState(); renderApp(); showToast('Transaction deleted.'); }
    function resetAllData(){ if(!confirm('This will permanently remove all saved data in this browser. Continue?')) return; state=clone(DEFAULT_STATE); saveState(); renderApp(); closeMobileMenu(); showToast('All data reset.'); }

    function getPageMeta(){ if(state.currentView==='bankBalances') return {title:'Bank Balance',subtitle:'Cleaner cards with just the icon, amount, and direct edit controls.',back:true}; if(state.currentView==='savings') return {title:'Savings',subtitle:'Track your allocated savings by purpose, bank, monthly saved amount, and target month without double counting your total money.',back:true}; if(state.currentView==='clients') return {title:'Clients',subtitle:'Client list stays clean. Open each name only when you want to see the payment schedule.',back:true}; if(state.currentView==='jobApplications') return {title:'Job Applications',subtitle:'Track the role, salary, status, link, and source platform in one cleaner system.',back:true}; if(state.currentView==='bills') return {title:'Bills',subtitle:'Track unpaid bills and subtract them when paid.',back:true}; if(state.currentView==='subscriptions') return {title:'Subscriptions',subtitle:'Track recurring costs and mark them paid when needed.',back:true}; if(state.currentView==='categories') return {title:'Categories',subtitle:'Build your own custom structure.',back:true}; if(state.currentView==='transactions') return {title:'Transactions',subtitle:'Your full posted money history.',back:true}; if(state.currentView==='balanceDetail') return {title:'Main Balance',subtitle:'Bank balances plus posted transaction balance.',back:true}; if(state.currentView==='debtDetail') return {title:'Debt Dashboard',subtitle:'All unpaid bills and subscriptions.',back:true}; if(state.currentView==='extraDetail') return {title:'Extra Money',subtitle:'Your balance minus unpaid debt.',back:true}; if(state.currentView==='categoryDetail') return {title:getCategoryName(state.selectedCategoryId),subtitle:`${getCategoryName(state.selectedCategoryId)} dashboard.`,back:true}; return {title:'Dashboard',subtitle:'Your complete money overview with premium wellness signals and reminders.',back:false}; }
    function renderNav(){ const build=()=>NAV_ITEMS.map(item=>`<button type="button" class="${state.currentView===item.key?'active':''}" onclick="setView('${item.key}')"><span>${item.label}</span></button>`).join(''); el('desktopNav').innerHTML=build(); el('mobileSidebarNav').innerHTML=build(); }

    function renderDashboardView(){ const summary=getSummary(); const wellness=getWellnessData(); const reminders=getReminders(); const recentTransactions=clone(state.transactions).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5); const ring=wellness.overall==='Healthy'?82:wellness.overall==='Watch'?58:28; const circumference=2*Math.PI*68; const dashOffset=circumference-(ring/100)*circumference; const categoryCards=state.categories.map(category=>{ const items=state.transactions.filter(t=>t.categoryId===category.id); const total=items.reduce((sum,t)=>sum+(t.type==='income'?Number(t.amount):-Number(t.amount)),0); return `<div class="category-card glass-soft" onclick="setView('categoryDetail', '${category.id}')"><div class="item-title">${escapeHtml(category.name)}</div><div class="meta"><span>${items.length} entries</span></div><div style="margin-top:10px;font-size:18px;font-weight:850;">${formatMoney(total)}</div></div>`; }).join(''); const recentHtml=recentTransactions.length ? recentTransactions.map(txn=>`<div class="ledger-row"><div><div style="font-weight:850;font-size:14px;">${escapeHtml(txn.title)}</div><div class="meta"><span>${escapeHtml(txn.sourceType)}</span><span>${formatDate(txn.createdAt.slice(0,10))}</span><span>${escapeHtml(getCategoryName(txn.categoryId))}</span></div></div><div class="amount ${txn.type}">${txn.type==='income'?'+':'-'} ${formatMoney(txn.amount)}</div></div>`).join('') : `<div class="empty">No transactions yet. Start with a client payment, bill, subscription, or manual transaction.</div>`; const remindersHtml=reminders.length ? reminders.map(item=>`<div class="reminder-row glass-soft ${item.status==='overdue'?'overdue':''}"><div class="reminder-badge ${item.status}">${item.status==='overdue'?'!':'⏰'}</div><div><div class="reminder-title">${escapeHtml(item.label)}</div><div class="reminder-sub">${item.type==='client'?formatCurrency(item.amount,item.currency||'PHP'):formatMoney(item.amount)} • ${formatDate(item.date)} • ${item.days<0?`${Math.abs(item.days)} day(s) late`:item.days===0?'due today':`${item.days} day(s) left`}</div></div><div class="pill ${item.status==='overdue'?'red':'blue'}">${item.status==='overdue'?'Overdue':'Upcoming'}</div></div>`).join('') : `<div class="empty">Nothing urgent right now. Your upcoming payments and bills will show here automatically.</div>`; const expenseDist=wellness.expenseBuckets.length ? wellness.expenseBuckets.map(row=>{ const width=(row.amount/(wellness.summary.transactionExpenses||1))*100; return `<div class="distribution-row"><div class="distribution-head"><div class="distribution-title">${escapeHtml(row.name)}</div><div class="distribution-copy">${formatMoney(row.amount)}</div></div><div class="distribution-progress"><span style="width:${Math.min(width,100)}%"></span></div></div>`; }).join('') : `<div class="empty">Add expense transactions with categories to unlock your spending distribution.</div>`; const suggestionHtml=wellness.suggestions.map(s=>`<div class="suggestion-card"><div class="suggestion-title">${escapeHtml(s.title)}</div><div class="suggestion-copy">${escapeHtml(s.copy)}</div></div>`).join(''); return `<div class="view-wrap"><div class="stats"><div class="card glass clickable" onclick="setView('balanceDetail')"><div class="stat-label">Main Balance</div><div class="stat-value">${formatMoney(summary.balance)}</div><div class="stat-sub">Bank total plus posted transaction balance</div></div><div class="card glass clickable" onclick="setView('bankBalances')"><div class="stat-label">Bank Total</div><div class="stat-value">${formatMoney(summary.bankTotal)}</div><div class="stat-sub">${state.bankAccounts.length} bank account(s)</div></div><div class="card glass clickable" onclick="setView('savings')"><div class="stat-label">Savings Total</div><div class="stat-value">${formatMoney(summary.savingsTotal)}</div><div class="stat-sub">Allocated inside your total money</div></div><div class="card glass clickable" onclick="setView('debtDetail')"><div class="stat-label">Debt</div><div class="stat-value">${formatMoney(summary.debt)}</div><div class="stat-sub">All unpaid bills and subscriptions</div></div><div class="card glass clickable" onclick="setView('extraDetail')"><div class="stat-label">Extra Money</div><div class="stat-value">${formatMoney(summary.extraMoney)}</div><div class="stat-sub">Balance minus unpaid debt</div></div><div class="card glass clickable" onclick="setView('categories')"><div class="stat-label">Categories</div><div class="stat-value">${state.categories.length}</div><div class="stat-sub">Open and manage custom categories</div></div></div><div class="well-hero"><div class="well-hero-top"><div><div class="well-kicker">Financial wellness engine</div><h3>${wellness.overall} money flow</h3><p>This dashboard now reads your posted income, expenses, savings, and debt pressure, then turns that into a cleaner performance view with clear direction.</p><div class="well-insights"><div class="well-card"><div class="label">Savings Discipline</div><div class="value">${wellness.savingsScore}%</div><div class="sub">How much of your current balance is already protected in savings buckets.</div></div><div class="well-card"><div class="label">Spending Control</div><div class="value">${wellness.spendingScore}%</div><div class="sub">Higher is better. This reacts to your posted income versus posted expenses.</div></div><div class="well-card"><div class="label">Stability</div><div class="value">${wellness.stabilityScore}%</div><div class="sub">This drops when unpaid debt starts eating too much of your available balance.</div></div></div></div><div class="card glass-soft" style="padding:14px;"><div class="section-title" style="margin-bottom:0;"><div><h3 style="font-size:16px;">Overall health</h3><p style="margin-top:4px;">A quick visual pulse of your finances.</p></div></div><div class="ring-wrap"><svg width="190" height="190" viewBox="0 0 190 190"><defs><linearGradient id="ringGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="var(--accent)"/><stop offset="55%" stop-color="var(--accent-2)"/><stop offset="100%" stop-color="var(--accent-3)"/></linearGradient></defs><circle cx="95" cy="95" r="68" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="16"></circle><circle cx="95" cy="95" r="68" fill="none" stroke="url(#ringGradient)" stroke-width="16" stroke-linecap="round" transform="rotate(-90 95 95)" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"></circle></svg><div class="ring-center"><strong>${ring}%</strong><span>${wellness.overall}</span></div></div><div class="bar-chart"><div class="bar-row"><div class="bar-label">Savings</div><div class="bar-track"><div class="bar-fill" style="width:${wellness.savingsScore}%"></div></div><div class="bar-value">${wellness.savingsScore}%</div></div><div class="bar-row"><div class="bar-label">Spending</div><div class="bar-track"><div class="bar-fill" style="width:${wellness.spendingScore}%"></div></div><div class="bar-value">${wellness.spendingScore}%</div></div><div class="bar-row"><div class="bar-label">Stability</div><div class="bar-track"><div class="bar-fill" style="width:${wellness.stabilityScore}%"></div></div><div class="bar-value">${wellness.stabilityScore}%</div></div></div></div></div></div><div class="content-grid" style="margin-top:12px;"><div class="stack"><div class="card glass"><div class="section-title"><div><h3>Smart Reminders</h3><p>Upcoming and overdue items from clients, bills, and subscriptions.</p></div></div><div class="reminder-list">${remindersHtml}</div></div><div class="card glass"><div class="section-title"><div><h3>Auto Suggestions</h3><p>Advice generated from your current numbers, not generic tips.</p></div></div><div class="suggestions-grid">${suggestionHtml}</div></div><div class="card glass"><div class="section-title"><div><h3>Recent Transactions</h3><p>Your latest posted activity.</p></div><button class="btn" type="button" onclick="setView('transactions')">Open full history</button></div>${recentHtml}</div></div><div class="stack"><div class="card glass"><div class="section-title"><div><h3>Spending Distribution</h3><p>Where your expense money is going right now.</p></div></div><div class="distribution-list">${expenseDist}</div></div><div class="card glass"><div class="section-title"><div><h3>Quick Numbers</h3><p>Your money at a glance.</p></div></div><div class="mini-grid"><div class="mini-card glass-soft"><div class="label">Saved This Month</div><div class="value">${formatMoney(summary.savedThisMonthTotal)}</div></div><div class="mini-card glass-soft"><div class="label">Avg Expense</div><div class="value">${formatMoney(wellness.avgExpense)}</div></div><div class="mini-card glass-soft"><div class="label">Avg Income</div><div class="value">${formatMoney(wellness.avgIncome)}</div></div><div class="mini-card glass-soft"><div class="label">Savings Gap</div><div class="value">${wellness.savingsGap}%</div></div></div></div><div class="card glass"><div class="section-title"><div><h3>Category Overview</h3><p>Open any category dashboard.</p></div></div><div class="categories-grid">${categoryCards || `<div class="empty">No categories yet.</div>`}</div></div></div></div></div>`; }

rm class="form-grid" onsubmit="addBankAccount(event)"><div class="field"><label>Bank Name</label><input id="bankName" placeholder="BPI / UnionBank / Maya" /></div><div class="field"><label>Amount</label><input id="bankAmount" type="number" min="0" step="0.01" placeholder="15000" /></div><div class="field" style="grid-column:span 2;"><label>&nbsp;</label><button class="btn primary" type="submit">Add bank account</button></div></form></div><div class="card glass"><div class="section-title"><div><h3>Bank Accounts</h3><p>Compact cards so the view stays clean as your banks grow.</p></div></div><div class="bank-grid">${listHtml}</div></div></div>`; }

    function renderClientsView(){ const clientListHtml=state.clients.length ? state.clients.map(client=>{ const counts=getClientScheduleCounts(client); const isOpen=state.expandedClientId===client.id; const scheduleHtml=(client.schedules||[]).map(schedule=>{ const cls=schedule.status==='paid'?'paid':schedule.status==='delayed'?'delayed':'pending'; const label=schedule.status==='paid'?'Paid':schedule.status==='delayed'?'Delayed':'Pending'; return `<div class="month-chip"><div><div class="month-chip-name">${escapeHtml(getMonthLabelFromDate(schedule.dueDate))}</div><div class="month-chip-amount">${formatCurrency(schedule.expectedAmount, client.currency)}</div><div class="month-chip-amount">${formatDate(schedule.dueDate)}</div></div><div><div class="month-status ${cls}">${label}</div><div class="month-chip-actions" style="margin-top:8px;"><button class="chip-action paid" type="button" onclick="setClientScheduleStatus('${client.id}', '${schedule.id}', 'paid')">✓</button><button class="chip-action pending" type="button" onclick="setClientScheduleStatus('${client.id}', '${schedule.id}', 'pending')">•</button><button class="chip-action delayed" type="button" onclick="setClientScheduleStatus('${client.id}', '${schedule.id}', 'delayed')">✕</button></div></div></div>`; }).join(''); return `<div class="client-card glass ${isOpen?'open':''}"><div class="client-head"><div class="client-name-wrap"><h3 class="client-name">${escapeHtml(client.name)}</h3><div class="client-meta-line"><span class="client-highlight">${client.rateType==='hourly'?'Hourly':'Fixed Monthly'}</span><span class="client-highlight">Expected ${formatCurrency(client.expectedMonthlyAmount, client.currency)}</span><span class="client-highlight">Next ${formatDate(client.nextPaymentDate)}</span></div></div><div class="client-head-actions"><span class="pill blue">${counts.pending} Pending</span><span class="pill green">${counts.paid} Paid</span><span class="pill yellow">${counts.delayed} Delayed</span><button class="c <div class="item-title">Formula</div><div class="meta">Main Balance = Bank Total + Posted Transaction Balance</div></div></div></div></div>`; }
    function renderDebtDetailView(){ const unpaidBills=state.bills.filter(b=>!b.paid); const unpaidSubs=state.subscriptions.filter(s=>!s.paid); let itemsHtml=''; unpaidBills.forEach(b=>{ itemsHtml += `<div class="item glass"><div class="item-head"><div><div class="item-title">${escapeHtml(b.name)}</div><div class="meta"><span>Bill</span><span>Due: ${formatDate(b.dueDate)}</span><span>${escapeHtml(getCategoryName(b.categoryId))}</span></div></div><div class="pill-row"><span class="pill red">${formatMoney(b.amount)}</span></div></div></div>`; }); unpaidSubs.forEach(s=>{ itemsHtml += `<div class="item glass"><div class="item-head"><div><div class="item-title">${escapeHtml(s.name)}</div><div class="meta"><span>Subscription</span><span>Renewal: ${escapeHtml(s.renewal||'Not set')}</span><span>${escapeHtml(getCategoryName(s.categoryId))}</span></div></div><div class="pill-row"><span class="pill red">${formatMoney(s.amount)}</span></div></div></div>`; }); if(!itemsHtml) itemsHtml=`<div class="empty">No unpaid bills or subscriptions.</div>`; return `<div class="view-wrap list"><div class="card glass"><div class="section-title"><div><h3>Debt Dashboard</h3><p>Debt here means unpaid bills and subscriptions.</p></div></div><div class="mini-grid"><div class="mini-card glass-soft"><div class="label">Unpaid Bills</div><div class="value">${formatMoney(unpaidBills.reduce((s,x)=>s+Number(x.amount),0))}</div></div><div class="mini-card glass-soft"><div class="label">Unpaid Subscriptions</div><div class="value">${formatMoney(unpaidSubs.reduce((s,x)=>s+Number(x.amount),0))}</div></div></div></div><div class="card glass"><div class="section-title"><div><h3>Open Debt Items</h3><p>Mark them paid in their own section to reduce debt.</p></div></div><div class="list">${itemsHtml}</div></div></div>`; }
    function renderExtraDetailView(){ const summary=getSummary(); return `<div class="view-wrap list"><div class="stats"><div class="card glass"><div class="stat-label">Main Balance</div><div class="stat-value">${formatMoney(summary.balance)}</div><div class="stat-sub">Bank total plus posted transaction balance</div></div><div class="card glass"><div class="stat-label">Debt</div><div class="stat-value">${formatMoney(summary.debt)}</div><div class="stat-sub">Still unpaid</div></div><div class="card glass"><div class="stat-label">Savings Total</div><div class="stat-value">${formatMoney(summary.savingsTotal)}</div><div class="stat-sub">Protected allocation</div></div><div class="card glass"><div class="stat-label">Extra Money</div><div class="stat-value">${formatMoney(summary.extraMoney)}</div><div class="stat-sub">Balance minus unpaid debt</div></div></div><div class="card glass"><div class="section-title"><div><h3>How extra money works</h3><p>This is automatic.</p></div></div><div class="list"><div class="item glass-soft"><div class="item-title">Formula</div><div class="meta">Extra Money = Main Balance - Debt</div></div><div class="item glass-soft"><div class="item-title">Savings note</div><div class="meta">Savings is shown separately so you can still see your allocated money clearly without double counting your total funds.</div></div></div></div></div>`; }
    function renderCategoryDetailView(){ const category=state.categories.find(c=>c.id===state.selectedCategoryId); if(!category) return `<div class="view-wrap card glass"><div class="empty">Category not found.</div></div>`; const txns=state.transactions.filter(t=>t.categoryId===category.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); const income=txns.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0); const expense=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0); const net=income-expense; const listHtml=txns.length ? txns.map(txn=>`<div class="item glass"><div class="item-head"><div><div class="item-title">${escapeHtml(txn.title)}</div><div class="meta"><span>${escapeHtml(txn.sourceType)}</span><span>${formatDate(txn.createdAt.slice(0,10))}</span></div></div><div class="pill-row"><span class="pill ${txn.type==='income'?'green':'red'}">${txn.type==='income'?'+':'-'} ${formatMoney(txn.amount)}</span></div></div></div>`).join('') : `<div class="empty">No transactions yet in this category.</div>`; return `<div class="view-wrap list"><div class="stats"><div class="card glass"><div class="stat-label">Category</div><div class="stat-value">${escapeHtml(category.name)}</div><div class="stat-sub">Custom dashboard</div></div><div class="card glass"><div class="stat-label">Income</div><div class="stat-value">${formatMoney(income)}</div><div class="stat-sub">Income inside this category</div></div><div class="card glass"><div class="stat-label">Expense</div><div class="stat-value">${formatMoney(expense)}</div><div class="stat-sub">Expense inside this category</div></div><div class="card glass"><div class="stat-label">Net</div><div class="stat-value">${formatMoney(net)}</div><div class="stat-sub">${txns.length} transactions</div></div></div><div class="card glass"><div class="section-title"><div><h3>${escapeHtml(category.name)} Transactions</h3><p>This dashboard only shows this category.</p></div></div><div class="list">${listHtml}</div></div></div>`; }

    function renderView(){ switch(state.currentView){ case 'bankBalances': return renderBankBalancesView(); case 'savings': return renderSavingsView(); case 'clients': return renderClientsView(); case 'jobApplications': return renderJobApplicationsView(); case 'bills': return renderBillsView(); case 'subscriptions': return renderSubscriptionsView(); case 'categories': return renderCategoriesView(); case 'transactions': return renderTransactionsView(); case 'balanceDetail': return renderBalanceDetailView(); case 'debtDetail': return renderDebtDetailView(); case 'extraDetail': return renderExtraDetailView(); case 'categoryDetail': return renderCategoryDetailView(); default: return renderDashboardView(); } }
    function renderApp(){ applyTheme(); renderNav(); const meta=getPageMeta(); el('pageTitle').textContent=meta.title; el('pageSubtitle').textContent=meta.subtitle; el('backBtn').classList.toggle('hidden', !meta.back); el('appView').innerHTML=renderView(); if(state.currentView==='jobApplications') handleJobApplicationStatusSelectChange(); if(state.currentView==='clients') handleClientRateTypeChange(); }

    el('themeSwitchSide').addEventListener('click', toggleTheme); el('themeSwitchTop').addEventListener('click', toggleTheme); el('themeSwitchDesktopTop').addEventListener('click', toggleTheme); el('themeSwitchMobile').addEventListener('click', toggleTheme); el('backBtn').addEventListener('click', goHome); el('resetBtn').addEventListener('click', resetAllData); el('resetBtnMobile').addEventListener('click', resetAllData); el('hamburgerBtn').addEventListener('click', openMobileMenu);
    Object.assign(window,{ setView, closeMobileMenu, toggleEditPanel, toggleClientPanel, saveBankAmount, deleteBankAccount, addSavings, saveSavings, deleteSavings, handleClientRateTypeChange, setClientScheduleStatus, deleteClient, handleJobApplicationStatusSelectChange, saveJobApplication, deleteJobApplication, toggleBillPaid, deleteBill, toggleSubscriptionPaid, deleteSubscription, deleteCategory, deleteTransaction, addBankAccount, addClient, addJobApplication, addBill, addSubscription, addCategory, addManualTransaction });
    renderApp();
  </script>
</body>
