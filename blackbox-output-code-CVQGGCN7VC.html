<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hey you 🌹</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --pink: #ff4da6;
    --light-pink: #ff85c1;
    --soft-pink: #ffb3d9;
    --pale-pink: #fff0f7;
    --rose-red: #e8365d;
    --text-dark: #3a1a2e;
  }

  body {
    background: #ffffff;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    cursor: none;
    user-select: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    background: var(--pink);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: multiply;
  }

  /* Canvas for background animations */
  #bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Trail canvas */
  #trailCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Main content */
  #main {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  #headline {
    font-size: clamp(3rem, 8vw, 7rem);
    color: var(--pink);
    font-weight: 400;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    position: relative;
    cursor: default;
    transition: transform 0.3s ease, text-shadow 0.3s ease;
    text-align: center;
    padding: 0 20px;
    line-height: 1.1;
  }

  #headline::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    transform: skewX(-20deg);
    transition: none;
  }

  #headline:hover {
    transform: scale(1.03);
    text-shadow: 0 0 40px rgba(255, 77, 166, 0.4), 0 0 80px rgba(255, 77, 166, 0.2);
  }

  #headline:hover::after {
    animation: shine 0.8s ease forwards;
  }

  @keyframes shine {
    0% { left: -100%; }
    100% { left: 150%; }
  }

  #subtext {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--light-pink);
    margin-top: 12px;
    opacity: 0;
    animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    letter-spacing: 0.05em;
    font-style: italic;
    text-align: center;
  }

  #btn {
    margin-top: 48px;
    padding: 16px 44px;
    background: linear-gradient(135deg, var(--pink), var(--light-pink));
    border: none;
    border-radius: 50px;
    color: white;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-family: 'Georgia', serif;
    letter-spacing: 0.04em;
    cursor: none;
    pointer-events: all;
    opacity: 0;
    animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
    box-shadow: 0 4px 20px rgba(255, 77, 166, 0.3);
  }

  #btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--light-pink), #ff99cc);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 50px;
  }

  #btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 8px 35px rgba(255, 77, 166, 0.5), 0 0 0 4px rgba(255, 77, 166, 0.1);
  }

  #btn:hover::before {
    opacity: 1;
  }

  #btn:active {
    transform: translateY(0) scale(0.97);
  }

  #btn span {
    position: relative;
    z-index: 1;
  }

  /* Click counter display (hidden) */
  #clickCount {
    display: none;
  }

  /* Floating text elements */
  .float-text {
    position: fixed;
    font-family: 'Georgia', serif;
    font-style: italic;
    color: var(--pink);
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    font-size: clamp(0.8rem, 2vw, 1rem);
    white-space: nowrap;
  }

  /* Burst elements */
  .burst-item {
    position: fixed;
    pointer-events: none;
    z-index: 15;
    font-size: 1.4rem;
    opacity: 0;
  }

  /* Confession overlay */
  #confession {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    background: rgba(255,255,255,0);
    transition: background 2s ease;
  }

  #confession.active {
    pointer-events: all;
    background: rgba(255,255,255,0.15);
  }

  #confession-line1,
  #confession-line2 {
    font-size: clamp(1.8rem, 5vw, 4rem);
    color: var(--text-dark);
    font-weight: 400;
    opacity: 0;
    text-align: center;
    padding: 0 30px;
    line-height: 1.3;
  }

  #confession-line2 {
    color: var(--pink);
    margin-top: 20px;
    font-size: clamp(2rem, 6vw, 5rem);
  }

  /* Bloom animation */
  .bloom {
    position: fixed;
    pointer-events: none;
    z-index: 25;
    font-size: 2.5rem;
    opacity: 0;
    transform-origin: center;
  }

  /* Special rose */
  .special-rose-container {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
  }

  .special-rose-container .rose-emoji {
    font-size: 3rem;
    filter: drop-shadow(0 0 15px rgba(255, 77, 166, 0.6));
  }

  .special-rose-container .special-text {
    font-size: 0.75rem;
    color: var(--pink);
    font-style: italic;
    margin-top: 6px;
    letter-spacing: 0.08em;
    opacity: 0.85;
  }

  /* Sparkle */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--soft-pink);
    opacity: 0;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInScale {
    from {
      opacity: 0;
      transform: scale(0.8);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* Glow overlay for confession */
  #glow-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255, 182, 217, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 3s ease;
  }

  #glow-overlay.active {
    opacity: 1;
  }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    #btn {
      padding: 14px 36px;
    }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<canvas id="trailCanvas"></canvas>
<div id="glow-overlay"></div>

<div id="main">
  <div id="headline">hey you 🌹</div>
  <div id="subtext">something small, just for you</div>
  <button id="btn" onclick="handleClick(event)">
    <span>pick a rose 🌹</span>
  </button>
</div>

<div id="confession">
  <div id="confession-line1"></div>
  <div id="confession-line2"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let clickCount = 0;
let confessionTriggered = false;
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let targetX = mouseX;
let targetY = mouseY;
let confessionPhase = false;

// ─── Cursor ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', (e) => {
  targetX = e.clientX;
  targetY = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ─── Background Canvas ────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');

function resizeCanvases() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

// Floating hearts
const hearts = [];
const petals = [];

function createHeart() {
  return {
    x: Math.random() * window.innerWidth,
    y: window.innerHeight + 20,
    size: Math.random() * 14 + 6,
    speed: Math.random() * 0.6 + 0.3,
    opacity: Math.random() * 0.4 + 0.1,
    drift: (Math.random() - 0.5) * 0.4,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.02 + 0.005,
    parallaxFactor: Math.random() * 0.03 + 0.005,
    baseX: 0,
  };
}

function createPetal() {
  return {
    x: Math.random() * window.innerWidth,
    y: -20,
    size: Math.random() * 10 + 5,
    speed: Math.random() * 0.5 + 0.2,
    opacity: Math.random() * 0.35 + 0.1,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.03,
    drift: (Math.random() - 0.5) * 0.5,
    parallaxFactor: Math.random() * 0.02 + 0.003,
    baseX: 0,
  };
}

// Initialize
for (let i = 0; i < 18; i++) {
  const h = createHeart();
  h.y = Math.random() * window.innerHeight;
  h.baseX = h.x;
  hearts.push(h);
}
for (let i = 0; i < 14; i++) {
  const p = createPetal();
  p.y = Math.random() * window.innerHeight;
  p.baseX = p.x;
  petals.push(p);
}

function drawHeart(ctx, x, y, size, opacity, color = '#ff85c1') {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = color;
  ctx.beginPath();
  const s = size * 0.5;
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.2);
  ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s * 1.1, x, y + s * 1.1);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.7, x + s, y + s * 0.2);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
  ctx.restore();
}

function drawPetal(ctx, x, y, size, opacity, rotation) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.fillStyle = '#ffb3d9';
  ctx.beginPath();
